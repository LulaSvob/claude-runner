defaults:
  model: "claude-opus-4-6[1m]"
  maxRetries: 2
  storyTimeoutSeconds: 10800
  quotaWaitSeconds: 3600
  quotaMaxWaits: 12
  authPollIntervalSeconds: 180

notify:
  provider: "ntfy"
  ntfy:
    baseUrl: "https://ntfy.sh"

logging:
  level: "info"
  sdkDebug: true

resumeSentinel: "/tmp/claude-runner-resume"
